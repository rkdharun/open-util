<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <!-- Accent gradient for brackets -->
    <linearGradient id="accentLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6EE7F7"/>
      <stop offset="100%" style="stop-color:#4FC3F7"/>
    </linearGradient>
    <linearGradient id="accentRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentSlash" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#FCD34D"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Rounded rect clip -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle grid lines for "developer" feel -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Subtle top highlight band -->
  <rect x="0" y="0" width="512" height="2" rx="0" fill="white" opacity="0.06"/>

  <!-- Left bracket < -->
  <path d="M 148 178 L 82 256 L 148 334"
    fill="none"
    stroke="url(#accentLeft)"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Right bracket > -->
  <path d="M 364 178 L 430 256 L 364 334"
    fill="none"
    stroke="url(#accentRight)"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Forward slash / -->
  <line x1="294" y1="168" x2="218" y2="344"
    stroke="url(#accentSlash)"
    stroke-width="40"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Bottom tagline dots — optional accent dots -->
  <circle cx="214" cy="408" r="7" fill="#6EE7F7" opacity="0.5"/>
  <circle cx="256" cy="408" r="7" fill="#F472B6" opacity="0.5"/>
  <circle cx="298" cy="408" r="7" fill="#A78BFA" opacity="0.5"/>
</svg>
